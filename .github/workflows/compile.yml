name: Compile LaTeX Document
on: [push]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: maths.tex
          compiler: xelatex

      - name: Upload PDF to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: maths.pdf